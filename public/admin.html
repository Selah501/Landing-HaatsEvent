<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이벤트 관리자 폼</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f4f5; color: #111; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { color: #222; }
        .card { border: 1px solid #ddd; padding: 16px; border-radius: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .card.ended { background-color: #f9f9f9; color: #888; }
        .badge { font-size: 12px; padding: 4px 8px; border-radius: 4px; font-weight: bold; margin-right: 8px; }
        .badge.active { background-color: #10b981; color: white; }
        .badge.ended { background-color: #9ca3af; color: white; }
        
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        
        button { background-color: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #2563eb; }
        button.btn-danger { background-color: #ef4444; }
        button.btn-danger:hover { background-color: #dc2828; }
        button.btn-secondary { background-color: #6b7280; }
        
        textarea { width: 100%; height: 300px; padding: 12px; font-family: monospace; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; resize: vertical; margin-top: 12px; }
        
        .section { margin-top: 40px; border-top: 2px solid #eee; padding-top: 24px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🛠 이벤트 관리자 폼</h1>
        <p style="color: #666; margin-bottom: 24px;">이 페이지는 관리자 전용입니다. 여기서 현장을 추가하거나 종료한 뒤, <b>생성된 코드</b>를 <code>events.js</code> 파일에 덮어씌워 배포하세요.</p>

        <h2>1. 현재 등록된 이벤트 목록</h2>
        <div id="event-list"></div>

        <div class="section">
            <h2>2. 신규 이벤트 추가</h2>
            <div class="form-group">
                <label>현장명 (예: 내포 롯데캐슬 핫썸머)</label>
                <input type="text" id="new-title" placeholder="현장명을 입력하세요">
            </div>
            <div class="form-group">
                <label>가격 표시 문구 (예: 하츠 복합환풍기 티오람미니 파격세일 195,000원)</label>
                <input type="text" id="new-price" placeholder="금액이 포함된 전체 문구를 입력하세요">
            </div>
            <div class="form-group">
                <label>접수 기간 문구 (예: 접수기간: 2026. 06. 30(화) ~ 07. 06(월))</label>
                <input type="text" id="new-period" placeholder="접수기간 전체 문구를 입력하세요">
            </div>
            <button onclick="addNewEvent()">+ 신규 이벤트 리스트에 추가하기</button>
        </div>

        <div class="section" style="background-color: #eff6ff; padding: 24px; border-radius: 8px; border: none;">
            <h2 style="margin-top:0;">3. 코드 생성 및 복사</h2>
            <p>위에서 수정한 결과가 아래 코드에 실시간으로 반영됩니다. 복사해서 <code>public/events.js</code> 파일 내용 전체를 지우고 붙여넣으세요.</p>
            <button onclick="copyCode()" style="background-color: #10b981; font-size: 16px;">📋 생성된 코드 복사하기</button>
            <textarea id="output-code" readonly></textarea>
        </div>
    </div>

    <!-- 기존 데이터를 불러옵니다 -->
    <script src="./events.js"></script>
    <script>
        // eventsData는 events.js에서 로드됨
        let currentData = JSON.parse(JSON.stringify(eventsData || []));

        function renderList() {
            const listDiv = document.getElementById('event-list');
            listDiv.innerHTML = '';
            
            currentData.forEach((ev, index) => {
                const isEnded = ev.status === 'ended';
                const card = document.createElement('div');
                card.className = `card ${isEnded ? 'ended' : ''}`;
                
                card.innerHTML = `
                    <div>
                        <span class="badge ${isEnded ? 'ended' : 'active'}">${isEnded ? '종료됨' : '진행중'}</span>
                        <strong style="font-size: 16px;">${ev.title}</strong>
                        <div style="font-size: 13px; margin-top: 4px; color: ${isEnded ? '#999' : '#555'};">${ev.periodText}</div>
                    </div>
                    <div>
                        ${!isEnded ? `<button class="btn-danger" onclick="endEvent(${index})">종료 처리하기</button>` : `<button class="btn-secondary" onclick="activateEvent(${index})">다시 진행중으로</button>`}
                    </div>
                `;
                listDiv.appendChild(card);
            });

            generateCode();
        }

        function endEvent(index) {
            currentData[index].status = 'ended';
            // 종료시 가격 문구를 날리고, 기간을 짧게 바꾸는 등의 로직을 넣을 수도 있지만 단순 유지를 위해 status만 변경
            // 요구사항에 맞춰 periodText를 간단히 '~종료일'로 바꾼다면 여기서 처리 가능
            renderList();
        }

        function activateEvent(index) {
            currentData[index].status = 'active';
            renderList();
        }

        function addNewEvent() {
            const title = document.getElementById('new-title').value;
            const priceText = document.getElementById('new-price').value;
            const periodText = document.getElementById('new-period').value;

            if(!title) { alert('현장명을 입력하세요.'); return; }

            const newEvent = {
                id: 'ev_' + Date.now(), // 고유 ID 생성
                title: title,
                priceText: priceText || '',
                periodText: periodText || '',
                status: 'active'
            };

            // 맨 위에 추가
            currentData.unshift(newEvent);
            
            // 폼 초기화
            document.getElementById('new-title').value = '';
            document.getElementById('new-price').value = '';
            document.getElementById('new-period').value = '';

            renderList();
        }

        function generateCode() {
            const code = `const eventsData = ${JSON.stringify(currentData, null, 4)};`;
            document.getElementById('output-code').value = code;
        }

        function copyCode() {
            const copyText = document.getElementById('output-code');
            copyText.select();
            document.execCommand('copy');
            alert('코드가 클립보드에 복사되었습니다! events.js 파일에 붙여넣기 하세요.');
        }

        // 초기 렌더링
        renderList();
    </script>
</body>
</html>
