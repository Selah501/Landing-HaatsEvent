<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하츠 충남대리점 공식 캠페인</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Oswald:wght@500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <div class="mobile-container">
        <nav class="sticky-nav">
            <div class="nav-logo"><span>[공식]</span>하츠 충남대리점</div>
            <a href="tel:010-2886-5086" class="btn btn-secondary">전화 문의</a>
        </nav>

        <header class="hero-section">
            <h1 class="hero-title">여름철 눅눅한 욕실,<br>언제까지 방치하시겠습니까?</h1>
            <p class="hero-subtitle">해당하시는 아파트 단지의 이벤트 현장을 선택해주세요.</p>
        </header>

        <main class="campaign-container" id="events-container">
            <!-- events.js 데이터를 기반으로 동적 렌더링 됩니다. -->
        </main>

        <!-- 추가 상품 기획전 섹션 -->
        <section style="padding: 0 24px 32px 24px;">
            <div style="background: linear-gradient(135deg, #2a2a2d 0%, #1c1c1e 100%); border-radius: 12px; padding: 24px; border: 1px solid #333; box-shadow: 0 8px 16px rgba(0,0,0,0.2);">
                <div style="text-align: center; margin-bottom: 20px;">
                    <span style="display: inline-block; background: var(--color-interactive-lime); color: var(--color-pitch-black); font-size: 12px; font-weight: bold; padding: 4px 10px; border-radius: 20px; margin-bottom: 8px;">함께 신청하면 혜택 UP!</span>
                    <h2 style="color: var(--color-pure-white); font-size: 18px; line-height: 1.4; margin: 0;">환풍기 시공할 때 같이 바꾸면 좋은<br><span style="color: var(--color-interactive-lime);">프리미엄 주방 기기 특가</span></h2>
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <a href="./products/hood.html" style="display: flex; justify-content: space-between; align-items: center; background-color: var(--color-graphite-base); padding: 16px; border-radius: 8px; text-decoration: none; border: 1px solid #444; transition: all 0.2s ease;">
                        <div>
                            <div style="color: var(--color-silver-mist); font-size: 13px; margin-bottom: 4px;">주방 공기를 쾌적하게</div>
                            <div style="color: var(--color-pure-white); font-size: 16px; font-weight: bold;">하츠 명품 후드 알아보기</div>
                        </div>
                        <div style="color: var(--color-interactive-lime); font-size: 20px; font-weight: bold;">➔</div>
                    </a>
                    
                    <a href="./products/sink-faucet.html" style="display: flex; justify-content: space-between; align-items: center; background-color: var(--color-graphite-base); padding: 16px; border-radius: 8px; text-decoration: none; border: 1px solid #444; transition: all 0.2s ease;">
                        <div>
                            <div style="color: var(--color-silver-mist); font-size: 13px; margin-bottom: 4px;">주방의 품격을 높이는</div>
                            <div style="color: var(--color-pure-white); font-size: 16px; font-weight: bold;">사각씽크볼 & 폭포수전 알아보기</div>
                        </div>
                        <div style="color: var(--color-interactive-lime); font-size: 20px; font-weight: bold;">➔</div>
                    </a>
                </div>
            </div>
        </section>

        <footer class="footer-area">
            <div class="quick-links">
                <a href="./products/tioram-mini.html">티오람 미니 제품상세</a>
                <a href="./guide/work-and-payment.html">교체공정 및 결제안내</a>
            </div>
            <div class="brand-footer">캠페인 주관사: TBJ 홈케어 사업부</div>
        </footer>
    </div>

    <!-- 이벤트 데이터 불러오기 -->
    <script src="./events.js"></script>
    <script>
        let currentEventName = "";
        const container = document.getElementById('events-container');

        // 이벤트 렌더링 로직
        function renderEvents() {
            let html = '';
            // 진행중 이벤트 렌더링
            eventsData.forEach(ev => {
                if (ev.status === 'active') {
                    html += `
                    <div id="card-${ev.id}" class="campaign-card active-card" onclick="toggleCampaign('${ev.id}', '${ev.title}')">
                        <span class="badge-status">진행중 EVENT</span>
                        <div class="card-title">${ev.title}</div>
                        <div class="card-price">${ev.priceText}</div>
                        <div class="card-period">${ev.periodText}</div>
                        <div class="click-arrow">▼ 클릭하여 신청하기</div>
                    </div>

                    <div id="content-${ev.id}" class="expanded-content">
                        <div class="flyer-extract">
                            <div class="flyer-tag">하츠 충남대리점 단독 기획 쿨세일</div>
                            <div class="flyer-text">🔥 찜통욕실 ➔ <span>완전시원! (자연풍 드라이)</span></div>
                            <div class="flyer-text">💧 뽀송욕실 ➔ <span>완전제습! (초강력 제습)</span></div>
                            <div class="flyer-text">🚬 담배냄새 ➔ <span>완벽차단! (고성능 전동댐퍼)</span></div>
                        </div>

                        <div style="display: flex; gap: 8px; margin-bottom: 24px;">
                            <a href="./products/tioram-mini.html" class="btn btn-outline">제품 상세 보기</a>
                            <a href="./guide/work-and-payment.html" class="btn btn-outline">시공 안내 보기</a>
                        </div>

                        <button id="btn-show-form-${ev.id}" class="btn btn-primary" style="margin-bottom: 12px;" onclick="showForm('${ev.id}')">👉 무료 상담 예약하기</button>

                        <div id="form-container-${ev.id}" style="display: none; background-color: var(--color-graphite-base); padding: 20px; border-radius: 8px; border: 1px solid #333;">
                            <div class="form-title">간편 상담 예약</div>
                            <div class="input-group">
                                <input type="text" id="apt-${ev.id}" placeholder="[아파트 동/호수] 예: 101동 102호">
                                <input type="text" id="phone-${ev.id}" placeholder="[연락처] 010-0000-0000">
                                <input type="text" id="time-${ev.id}" placeholder="[원하는 상담시간] 예: 평일 오후 2시 이후">
                            </div>
                            <button id="btn-submit-${ev.id}" class="btn btn-primary" onclick="submitForm('${ev.id}')">신청서 제출하기</button>
                            <button class="btn btn-ghost" style="margin-top: 8px;" onclick="hideForm('${ev.id}')">입력 취소</button>
                        </div>
                        
                        <button class="btn btn-ghost" style="margin-top: 12px;" onclick="toggleCampaign('${ev.id}', '')">▲ 이벤트 접기 (목록으로)</button>
                    </div>`;
                }
            });

            // 종료된 이벤트 렌더링
            eventsData.forEach(ev => {
                if (ev.status === 'ended') {
                    html += `
                    <div class="campaign-card ended-card" style="opacity: 0.5; filter: grayscale(100%); background-color: #222; border: 1px solid #444; padding: 16px; margin-bottom: 12px; border-radius: 8px; cursor: default; display: flex; align-items: center;">
                        <span style="background:#555; color:#fff; font-size:11px; padding:3px 8px; border-radius:4px; margin-right:12px; font-weight: bold; white-space: nowrap;">event종료</span>
                        <div style="font-size: 14px; color: #aaa; word-break: keep-all;">
                            ${ev.title} / 복합환풍기 파격세일 ${ev.periodText}
                        </div>
                    </div>`;
                }
            });

            container.innerHTML = html;
        }

        // 초기 렌더링 실행
        renderEvents();

        // 폼 열기/닫기 로직
        function showForm(id) {
            document.getElementById(`form-container-${id}`).style.display = "block";
            document.getElementById(`btn-show-form-${id}`).style.display = "none";
        }
        function hideForm(id) {
            document.getElementById(`form-container-${id}`).style.display = "none";
            document.getElementById(`btn-show-form-${id}`).style.display = "flex";
        }

        // 박스 클릭 시 타 단지 숨기기 및 토글 로직
        function toggleCampaign(id, eventName) {
            currentEventName = eventName;
            const targetContent = document.getElementById(`content-${id}`);
            const targetCard = document.getElementById(`card-${id}`);

            // 모든 진행중 카드와 컨텐츠 가져오기
            const allCards = document.querySelectorAll('.active-card');
            const allContents = document.querySelectorAll('.expanded-content');

            if (targetContent.style.display === "block") {
                // 원상 복구 (현재 열려있는걸 닫을 때)
                targetContent.style.display = "none";
                targetCard.classList.remove('active');
                hideForm(id); // 접을 때 폼도 초기화
                // 다른 모든 카드 다시 보이기
                allCards.forEach(card => card.style.display = "flex");
            } else {
                // 모두 숨기기
                allCards.forEach(card => card.style.display = "none");
                allContents.forEach(content => content.style.display = "none");
                
                // 선택한 것만 열기
                targetCard.style.display = "flex";
                targetCard.classList.add('active');
                targetContent.style.display = "block";
            }
        }

        // 구글 시트 데이터 전송 함수
        function submitForm(id) {
            const apartment = document.getElementById(`apt-${id}`).value;
            let phone = document.getElementById(`phone-${id}`).value;
            const consultTime = document.getElementById(`time-${id}`).value;

            // 전화번호 하이픈 자동 추가 처리
            phone = phone.replace(/[^0-9]/g, ''); // 숫자만 추출
            if (phone.length === 11) {
                phone = phone.replace(/(\d{3})(\d{4})(\d{4})/, '$1-$2-$3');
            } else if (phone.length === 10) {
                phone = phone.replace(/(\d{3})(\d{3})(\d{4})/, '$1-$2-$3');
            }

            if (!apartment || !phone) {
                alert("동/호수와 연락처를 입력해 주세요.");
                return;
            }

            const payload = {
                apartment: apartment,
                phone: phone,
                consultTime: consultTime,
                eventName: currentEventName
            };

            // 제출 버튼 비활성화 및 텍스트 변경
            const submitBtn = document.getElementById(`btn-submit-${id}`);
            const originalText = submitBtn.innerText;
            submitBtn.innerText = "제출 중... (잠시만 기다려주세요)";
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.7";
            submitBtn.style.cursor = "wait";

            const GOOGLE_WEBAPP_URL = "https://script.google.com/macros/s/AKfycby4sFDQcQ8BWX0jLdKZq86Ob3z537xSaHZ7Xl2ecg1k4kLO9Qw0TtMPG8BgUIiiUfekRQ/exec";
            fetch(GOOGLE_WEBAPP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).then(() => {
                // 원상복구
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
                submitBtn.style.opacity = "1";
                submitBtn.style.cursor = "pointer";

                alert(`상담신청이 완료되어 담당자가 곧 연락을 드리겠습니다. 신청해 주셔서 감사합니다.\n\n이벤트명 : ${currentEventName}\n하츠충남대리점`);
                // 신청 성공 후 입력 칸 초기화 및 리셋
                document.getElementById(`apt-${id}`).value = "";
                document.getElementById(`phone-${id}`).value = "";
                document.getElementById(`time-${id}`).value = "";
                toggleCampaign(id, currentEventName);
            }).catch(err => {
                // 원상복구
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
                submitBtn.style.opacity = "1";
                submitBtn.style.cursor = "pointer";

                alert("접수 중 오류가 발생했습니다. 전단지의 대표 번호로 전화 문의 부탁드립니다.");
                console.error(err);
            });
        }
    </script>
</body>

</html>
