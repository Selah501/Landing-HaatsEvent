<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사각씽크볼 & 폭포수전 - 하츠 충남대리점</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Oswald:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .placeholder {
            background-color: #222;
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 60px 20px;
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="mobile-container" style="min-height: 100vh; display: flex; flex-direction: column;">
        <nav class="sticky-nav">
            <div class="nav-logo"><span>[공식]</span>하츠 충남대리점</div>
            <a href="tel:010-2886-5086" class="btn btn-secondary">전화 문의</a>
        </nav>

        <div class="container" style="padding: 24px; flex: 1;">
            <div style="font-size: 14px; color: var(--color-interactive-lime); font-weight: bold; margin-bottom: 8px;">프리미엄 주방 기기 특가</div>
            <h1 style="color: var(--color-pure-white); font-size: 24px; line-height: 1.3; margin: 0 0 24px 0;">
                사각씽크볼 & 폭포수전
            </h1>

            <!-- 첫번째 제품: 사각싱크볼 세트 -->
            <div style="background-color: var(--color-graphite-base); border-radius: 8px; padding: 20px; margin-bottom: 24px; border: 1px solid #333;">
                <h2 style="color: var(--color-pure-white); margin-top: 0; margin-bottom: 16px; font-size: 20px;">하츠 사각싱크볼 HZ-EW8502SF</h2>
                <img src="../images/sink-main.png" alt="하츠 사각싱크볼" style="width: 100%; border-radius: 8px; margin-bottom: 12px; background-color: white;">
                
                <div style="font-size: 18px; font-weight: bold; color: var(--color-interactive-lime); margin-bottom: 8px;">특별가: 550,000원</div>
                <div style="font-size: 14px; color: var(--color-silver-mist); margin-bottom: 16px; line-height: 1.4;">
                    <strong>포함 내역:</strong><br>
                    하츠 엠보 리폼 850 사각싱크볼(인셋) + 폭포수전 + 올스텐배수구 + 설치비 포함
                </div>
                
                <div style="font-size: 15px; font-weight: bold; color: white; margin-bottom: 12px; border-bottom: 1px solid #444; padding-bottom: 4px;">주요 특징</div>
                <img src="../images/sink-features.png" alt="사각싱크볼 특징" style="width: 100%; border-radius: 8px; background-color: white;">
            </div>

            <!-- 두번째 제품: 폭포수전 단품 -->
            <div style="background-color: var(--color-graphite-base); border-radius: 8px; padding: 20px; margin-bottom: 24px; border: 1px solid #333;">
                <h2 style="color: var(--color-pure-white); margin-top: 0; margin-bottom: 16px; font-size: 20px;">폭포수전 단품 교체</h2>
                <img src="../images/faucet-only.png" alt="폭포수전 단품" style="width: 100%; border-radius: 8px; margin-bottom: 12px; background-color: white;">
                
                <div style="font-size: 18px; font-weight: bold; color: var(--color-interactive-lime); margin-bottom: 8px;">설치가: 130,000원</div>
                <div style="font-size: 14px; color: var(--color-silver-mist); margin-bottom: 16px; line-height: 1.4;">
                    <strong>모델명:</strong> 주방 싱크수전 FC TS100MS<br>
                    <strong>비고:</strong> 폭포수전만 단독으로 구입 및 설치 가능
                </div>
            </div>
            
            <div style="padding-bottom: 40px;"></div>
        </div>

        <!-- 하단 고정 버튼 영역 -->
        <div class="bottom-fixed-buttons" style="position: sticky; bottom: 0; background-color: var(--color-graphite-base); padding: 16px 24px; border-top: 1px solid #1c1c1e; display: flex; flex-direction: column; gap: 12px; z-index: 100;">
            <!-- 나중에 제품 정보가 나오면 여기에 '블로그로 자세히 보기' 버튼 등을 추가할 수 있습니다 -->
            <a href="../index.html" class="btn btn-ghost">
                ← 이벤트 메인 화면으로 돌아가기
            </a>
        </div>
    </div>
</body>
</html>
